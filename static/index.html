<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TRON-X · Nexus</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Grotesk:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400&display=swap" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" />
  <link rel="stylesheet" href="/static/css/hud.css" />
  <link rel="stylesheet" href="/static/css/luxe.css" />
</head>
<body data-persona="jarvis">

  <!-- Three.js animated background -->
  <canvas id="bg-canvas"></canvas>
  <!-- Scanline overlay -->
  <div class="scanlines"></div>
  <!-- Corner accents -->
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>

  <!-- ── TOP BAR ─────────────────────────────────────────────────────── -->
  <header class="topbar">
    <div class="topbar-left">
      <button class="icon-btn" id="sidebar-toggle" title="Toggle sidebar (Ctrl+B)">
        <svg width="16" height="12" viewBox="0 0 16 12" fill="none">
          <rect y="0" width="16" height="2" rx="1" fill="currentColor"/>
          <rect y="5" width="11" height="2" rx="1" fill="currentColor"/>
          <rect y="10" width="16" height="2" rx="1" fill="currentColor"/>
        </svg>
      </button>
      <div class="logo">
        <span class="logo-icon">&#11043;</span>
        <span class="logo-text">TRON<span class="logo-x">-X</span></span>
        <span class="logo-version">v2.0</span>
      </div>
      <div class="topbar-divider"></div>
      <div class="session-title-wrap" id="session-title-wrap">
        <span class="session-title" id="session-title" title="Click to rename">New Chat</span>
        <button class="icon-btn dim" id="rename-title-btn" title="Rename session">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
            <path d="M8.5 1.5L10.5 3.5L4 10H2V8L8.5 1.5Z" stroke="currentColor" stroke-width="1.2" fill="none"/>
          </svg>
        </button>
      </div>
    </div>
    <div class="topbar-right">
      <!-- Emotion state badge — shown when user emotion is detected -->
      <div class="emotion-badge" id="emotion-badge">
        <span class="emo-dot"></span>
        <span id="emotion-label">NEUTRAL</span>
      </div>
      <!-- Telugu language badge — shown when Telugu detected -->
      <div class="telugu-badge" id="telugu-badge">
        <svg width="9" height="9" viewBox="0 0 9 9" fill="none" style="flex-shrink:0">
          <circle cx="4.5" cy="4.5" r="4" stroke="currentColor" stroke-width="1"/>
          <path d="M3 4.5C3.5 3 5.5 3 6 4.5" stroke="currentColor" stroke-width="1" stroke-linecap="round"/>
        </svg>
        <span id="telugu-label">తె</span>
      </div>
      <div class="status-pill" id="status-pill">
        <span class="status-dot" id="conn-dot"></span>
        <span id="conn-label">CONNECTING</span>
      </div>
      <div class="topbar-divider"></div>
      <span id="active-persona" class="persona-badge">JARVIS</span>
      <span id="chat-model" class="model-label"></span>
      <div class="topbar-divider"></div>
      <span id="sys-time" class="mono time-display"></span>
      <div class="topbar-divider"></div>
      <button class="icon-btn" id="audio-toggle" title="Toggle voice audio">
        <svg id="audio-icon" width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M2 5H4L7 2V12L4 9H2V5Z" stroke="currentColor" stroke-width="1.2" fill="none"/>
          <path d="M9 4.5C9.8 5.3 9.8 8.7 9 9.5" stroke="currentColor" stroke-width="1.2"/>
          <path d="M10.5 3C12 4.5 12 9.5 10.5 11" stroke="currentColor" stroke-width="1.2"/>
        </svg>
      </button>
      <button class="icon-btn" id="text-toggle" title="Toggle text output">
        TEXT
      </button>
      <button class="icon-btn" id="agent-toggle" title="Toggle agent mode">
        AGENT
      </button>
      <button class="icon-btn" id="academic-toggle" title="Toggle academic mode">
        ACADEMIC
      </button>
    </div>
  </header>

  <!-- ── APP LAYOUT ───────────────────────────────────────────────────── -->
  <div class="app-layout" id="app-layout">

    <!-- ── SIDEBAR ──────────────────────────────────────────────────── -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <button class="new-chat-btn" id="new-chat-btn">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
            <line x1="6" y1="1" x2="6" y2="11" stroke="currentColor" stroke-width="1.5"/>
            <line x1="1" y1="6" x2="11" y2="6" stroke="currentColor" stroke-width="1.5"/>
          </svg>
          New Chat
        </button>
      </div>
      <div class="sidebar-section-label">RECENT</div>
      <div class="sessions-list" id="sessions-list">
        <div class="sessions-loading">Loading...</div>
      </div>
    </aside>

    <!-- ── CHAT PANEL ───────────────────────────────────────────────── -->
    <main class="chat-panel" id="chat-panel">

      <!-- Welcome screen -->
      <div class="welcome-screen" id="welcome-screen">
        <div class="welcome-glyph">&#11043;</div>
        <div class="welcome-title">TRON-X NEXUS</div>
        <div class="welcome-sub">Autonomous AI · Phase 2</div>
        <div class="welcome-hints">
          <div class="hint-chip">💬 Ask anything</div>
          <div class="hint-chip">🌦 Weather in Tokyo</div>
          <div class="hint-chip">₿ Bitcoin price</div>
          <div class="hint-chip">📈 AAPL stock</div>
          <div class="hint-chip">🖥 System stats</div>
          <div class="hint-chip">📰 Latest news</div>
        </div>
      </div>

      <!-- Messages area -->
      <div class="messages-area" id="chat-messages"></div>

      <!-- Input area -->
      <div class="input-area">
        <div class="chat-files-stage" id="chat-files-stage"></div>
        <div class="input-row">
          <select id="chat-persona" class="persona-select" title="Switch AI persona">
            <option value="jarvis">JARVIS</option>
            <option value="friday">FRIDAY</option>
          </select>
          <button id="chat-attach-btn" class="icon-btn" title="Attach files" style="margin-right:8px; opacity:0.7">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path>
            </svg>
          </button>
          <input type="file" id="chat-file-input" multiple hidden>
          <div class="input-wrapper">
            <textarea id="chat-input" class="chat-input" rows="1"
                      placeholder="Ask anything... (Enter to send, Shift+Enter for newline)"
                      autocomplete="off"></textarea>
          </div>
          <button id="chat-ptt" class="ptt-btn" title="Push to talk">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
              <circle cx="7" cy="5" r="3" stroke="currentColor" stroke-width="1.2"/>
              <path d="M3 7C3 9.2 4.8 11 7 11C9.2 11 11 9.2 11 7" stroke="currentColor" stroke-width="1.2"/>
              <line x1="7" y1="11" x2="7" y2="13" stroke="currentColor" stroke-width="1.2"/>
            </svg>
          </button>
          <button id="chat-send" class="send-btn">
            Send
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
              <path d="M1 11L11 1M11 1H4M11 1V8" stroke="currentColor" stroke-width="1.4"/>
            </svg>
          </button>
        </div>
      </div>
    </main>

    <!-- ── INFO CARD PANEL ──────────────────────────────────────────── -->
    <aside class="info-panel" id="info-card-area">
      <div class="info-card">
        <div class="info-card-header">
          <span class="info-card-icon">&#9672;</span>
          <span class="info-card-title" id="card-title">INFO</span>
          <button class="icon-btn card-close-btn" id="card-close" title="Close (Esc)">
            <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
              <line x1="1" y1="1" x2="9" y2="9" stroke="currentColor" stroke-width="1.4"/>
              <line x1="9" y1="1" x2="1" y2="9" stroke="currentColor" stroke-width="1.4"/>
            </svg>
          </button>
        </div>
        <div class="info-card-body" id="card-body">
          <div class="card-placeholder">—</div>
        </div>
      </div>
    </aside>

  </div><!-- /.app-layout -->

  <!-- Rename modal -->
  <div class="rename-modal" id="rename-modal" style="display:none">
    <div class="rename-modal-inner">
      <div class="rename-modal-title">RENAME CHAT</div>
      <input class="rename-modal-input" id="rename-modal-input" type="text" maxlength="80" />
      <div class="rename-modal-actions">
        <button class="btn-ghost" id="rename-modal-cancel">Cancel</button>
        <button class="btn-primary" id="rename-modal-save">Save</button>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
  <script src="/static/js/hud.js"></script>
  <script src="/static/js/panels.js"></script>
  <script defer src="/static/js/proactive.js"></script>
  <script defer src="/static/js/wake.js"></script>
</body>
</html>
